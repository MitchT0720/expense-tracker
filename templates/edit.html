<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4"></div>

    <h1>Edit Expense</h1>

    {% if error %}
    <p class="text-danger">{{ error }}</p>
    {% endif %}

    <div class="card p-3">

        <h4>Edit Expense</h4>

        <form action="/update/{{ expense.id }}" method="POST" class="row g-2">

            <div class="col-md-3">
                <input class="form-control" name="title" value="{{ expense.title }}" placeholder="Title">
            </div>

            <div class="col-md-2">
                <input class="form-control" name="amount" value="{{ expense.amount }}" placeholder="Amount">
            </div>

            <div class="col-md-2">
                <input class="form-control" type="date" name="date" value="{{ expense.date }}">
            </div>


            <div class="col-md-3">
                <select class="form-select" name="category">

                    <option value="Food" {% if expense.category=="Food" %}selected{% endif %}>Food</option>
                    <option value="Transport" {% if expense.category=="Transport" %}selected{% endif %}>Transport
                    </option>
                    <option value="Shopping" {% if expense.category=="Shopping" %}selected{% endif %}>Shopping</option>
                    <option value="Entertainment" {% if expense.category=="Entertainment" %}selected{% endif %}>
                        Entertainment</option>
                    <option value="Bills" {% if expense.category=="Bills" %}selected{% endif %}>Bills</option>
                    <option value="Other" {% if expense.category=="Other" %}selected{% endif %}>Other</option>

                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100">Update</button>
            </div>

        </form>

        <a href="/" class="btn btn-secondary mt-3">Back</a>

    </div>
</body>

</html>
